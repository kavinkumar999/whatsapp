name: Send WhatsApp messages

on:
  # Both triggers send the next message from the Upstash list (key wa:messages) and
  # advance the cursor. Manual runs are handy for testing; scheduled runs are the
  # daily ~6 AM IST send.
  workflow_dispatch:
  # Scheduled trigger: 22:00 UTC = 03:30 IST nominal (India, UTC+5:30, no DST).
  # GitHub cron is best-effort: the 00:30 UTC slot was firing ~4.5h late (~10:30 IST),
  # so we schedule earlier to make the actual run land near 06:00 IST. This relies
  # on the delay staying consistent; revisit if runs drift.
  schedule:
    - cron: "0 22 * * *"

# Never let two runs touch the Upstash session at the same time — overlapping
# runs would race and clobber each other's saved auth state.
concurrency:
  group: whatsapp-send
  cancel-in-progress: false

jobs:
  send:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Send messages
        env:
          UPSTASH_REDIS_REST_URL: ${{ secrets.UPSTASH_REDIS_REST_URL }}
          UPSTASH_REDIS_REST_TOKEN: ${{ secrets.UPSTASH_REDIS_REST_TOKEN }}
        run: node src/commands/send.js
